<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery - SVPCET UBA</title>

    <link rel="stylesheet" href="/static.css">


</head>

<body class="bg-gov-bg flex flex-col min-h-screen">

    <div id="navbar"></div>

    <main class="flex-grow">
        <div class="bg-[#144218] py-12 text-white text-center">
            <h1 class="text-4xl font-bold">Photo Gallery</h1>
            <p class="mt-2 text-blue-100">Glimpses of our initiatives</p>
        </div>

        <div class="container-custom py-12">

            <!-- Category: Visits -->
            <h2 class="text-2xl font-bold text-gov-primary mb-6 border-b pb-2">Village Visits & Surveys</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-12">
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/gallery 6.jpeg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/wardha.jpg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/Nitinsir.jpg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
            </div>

            <!-- Category: Projects -->
            <h2 class="text-2xl font-bold text-gov-primary mb-6 border-b pb-2">Project Implementations</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-12">
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/Agri_drone.jpg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/VNIT.jpeg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
                <div class="aspect-w-4 aspect-h-3">
                    <img src="/images/Hero_Section/group02.jpg"
                        class="object-cover rounded-lg shadow-md hover:opacity-90 transition-opacity w-full h-full">
                </div>
            </div>

        </div>
    </main>

    <div id="footer"></div>
    <script src="/static.js" defer></script>
</body>

</html>
